name: Fetch API to JSON

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Workflow started at: $(date)"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Fetch JSON via curl
        run: |
          set -euo pipefail
          URL="https://brsapi.ir/Api/Market/Gold_Currency.php?key=BSKDtB7FB31bcKKZgegXzfzLKQ2abZ5G"
          echo "Fetching: $URL"
          curl -fsSL --connect-timeout 30 --max-time 90 --retry 3 --retry-delay 10 "$URL" -o data.json
          test -s data.json
          jq empty data.json
          echo "Downloaded file preview:"
          head -c 200 data.json; echo

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit if changed
        run: |
          git status --short
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "chore: update data.json from API"
            git push
          else
            echo "No changes"
          fi
