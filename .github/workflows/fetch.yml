name: Fetch API to JSON

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/fetch.yml"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch JSON via curl
        run: |
          set -e
          curl -fsSL "https://brsapi.ir/Api/Market/Gold_Currency.php?key=BSKDtB7FB31bcKKZgegXzfzLKQ2abZ5G" -o data.json
          jq empty data.json
          test -s data.json || { echo "Empty data.json"; exit 1; }

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "chore: update data.json from API"
            git push
          else
            echo "No changes"
          fi
