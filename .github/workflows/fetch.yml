name: Debug BRS API

permissions:
  contents: write

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Network debug
        run: |
          set -x

          echo "DNS for brsapi.ir"
          nslookup brsapi.ir || true

          echo "DNS for api.brsapi.ir"
          nslookup api.brsapi.ir || true

          echo "Headers without following redirect"
          curl -Iv --connect-timeout 20 "https://brsapi.ir/Api/Market/Gold_Currency.php?key=BSKDtB7FB31bcKKZgegXzfzLKQ2abZ5G" || true

          echo "Headers with redirect"
          curl -ILv --connect-timeout 20 --max-time 60 "https://brsapi.ir/Api/Market/Gold_Currency.php?key=BSKDtB7FB31bcKKZgegXzfzLKQ2abZ5G" || true

          echo "Direct api.brsapi.ir test"
          curl -Iv --connect-timeout 20 "https://api.brsapi.ir" || true
